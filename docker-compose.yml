services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama

  mcp_server:
    build:
      context: ./mcp_server
    env_file:
      - .env
    ports:
      - "8080:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - ollama

  rag_service:
    build:
      context: ./rag_service
    env_file:
      - .env
    ports:
      - "8081:8000"
    depends_on:
      - qdrant
      - ollama

volumes:
  hf_cache:
