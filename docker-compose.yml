services:
  chroma:
    image: chromadb/chroma:latest
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama

  mcp_server:
    build:
      context: ./mcp_server
    env_file:
      - .env
    ports:
      - "8080:8000"
    depends_on:
      - chroma
      - ollama

  rag_service:
    build:
      context: ./rag_service
    env_file:
      - .env
    ports:
      - "8081:8000"
    depends_on:
      - chroma
      - ollama
